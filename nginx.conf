server {
    listen 80;
    server_name _;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.telegram.org https://api.frankfurter.app https://open.er-api.com https://api.apilayer.com https://api.fixer.io; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    root /var/www/html/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ $uri.php /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
    }

    location ~ /\.ht {
        deny all;
    }
}
